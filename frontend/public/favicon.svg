<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c94455"/>
      <stop offset="100%" style="stop-color:#81262E"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Film strip body -->
  <rect x="7" y="11" width="18" height="10" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Left sprocket holes -->
  <rect x="8.5" y="12.5" width="2" height="2" rx="0.5" fill="#81262E"/>
  <rect x="8.5" y="17.5" width="2" height="2" rx="0.5" fill="#81262E"/>
  <!-- Right sprocket holes -->
  <rect x="21.5" y="12.5" width="2" height="2" rx="0.5" fill="#81262E"/>
  <rect x="21.5" y="17.5" width="2" height="2" rx="0.5" fill="#81262E"/>
  <!-- Play triangle -->
  <polygon points="14,13.5 14,18.5 19.5,16" fill="#c94455"/>
</svg>
